name: Build Flet APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install flet requests

    - name: Build APK
      run: flet build apk

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: xach-chat-apk
        path: build/apk/*.apk
