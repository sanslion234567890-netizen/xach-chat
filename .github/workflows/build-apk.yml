name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Flet
        run: |
          pip install flet requests
          
      - name: Build APK
        run: |
          flet build apk --verbose
          
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: xach-chat-apk
          path: |
            build/apk/*.apk
            build/apk/**/*.apk
